spring:
  application:
    name: user-management-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:${SPRING_PROFILE:dev}}

  config:
    import: optional:file:./config/${spring.profiles.active}/secrets.properties

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
