spring:
  datasource:
    url: jdbc:h2:mem:user_management_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-user-management-service-tests
  expiration: 3600000
